name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Set the variable globally to use the updated Node.js runtime environment 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Free disk space (Safe & Stable Purge)
        run: |
          echo "=== Disk space BEFORE cleanup ==="
          df -h
          
          # Remove massive application/language stacks safely (No apt-get kernel tampering)
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift
          sudo rm -rf /opt/microsoft /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/share/texlive /usr/local/texlive
          sudo rm -rf /usr/lib/jvm /usr/share/java /usr/share/gradle
          sudo rm -rf /home/runner/.cargo /home/runner/.rustup
          sudo rm -rf /var/lib/snapd
          
          # Safe file system cleanups
          sudo rm -rf /usr/share/locale/* /usr/share/man/* /usr/share/doc/*
          sudo rm -rf /tmp/* /var/tmp/*
          
          # Clean docker system overhead cleanly
          docker system prune -af --volumes
          
          echo "=== Disk space AFTER cleanup ==="
          df -h

      - name: Checkout repo (Shallow Clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Set up Buildx to run natively using host network driver to avoid bridge virtualization blocks
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gadzela
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (With GitHub Cache Offloading)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gadzela/ltx23-10eros:latest
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            CIVITAI_TOKEN=${{ secrets.CIVITAI_TOKEN }}
          # Force the network driver into host mode during the build process
          network: host
          cache-from: type=gha
          cache-to: type=gha,mode=max
