name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift
          sudo rm -rf /opt/microsoft /usr/local/share/chromium /usr/share/dotnet
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' '^mysql-.*' '^mongodb-.*' \
            google-chrome-stable firefox powershell mono-complete \
            azure-cli google-cloud-sdk || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          docker system prune -af --volumes
          df -h

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gadzela
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gadzela/ltx23-10eros:latest
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            CIVITAI_TOKEN=${{ secrets.CIVITAI_TOKEN }}
          no-cache: true
